# Nav2 参数 (Full Plan D3 + 实车调优)
# 关键点: 工厂 FW 不支持 Mecanum 横移 (vy 忽略), 所以按差速车配置.
#        机器人半径 0.18m (底盘 280mm + 留 20mm)
# 2026-04-25 改: OmniMotionModel → DifferentialMotionModel
#   原因: 工厂 FW 是 diff-drive, vy 命令无效, 横移不可达.
#         AMCL 粒子滤波按差速假设, 精度更高, 收敛更快.

amcl:
  ros__parameters:
    robot_model_type: nav2_amcl::DifferentialMotionModel  # 差速 (工厂 FW 限制)
    max_particles: 2000
    min_particles: 500
    laser_max_range: 8.0
    laser_min_range: 0.10
    update_min_d: 0.05
    update_min_a: 0.05
    scan_topic: /scan_lidar  # 避开 ESP32 factory FW 空数据的 /scan (见 5802ee0)

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    # 默认 progress_checker 要求 10s 内移动 0.5m, 实测我们的车 mecanum + 死区
    # 跑不到这速度. 放宽: 20s 移动 0.05m. 同时 goal_checker xy_goal_tolerance 0.25
    # (默认 0.25), yaw_goal_tolerance 0.25 (默认 0.25), 这俩 default OK.
    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 20.0
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.5
      stateful: True
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.40  # 中等档, 跨过 ESP32 死区
      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      # 实测 ESP32 factory FW motor 死区: cmd_vel angular.z < 0.5 rad/s 时不响应,
      # linear.x < 0.1 m/s 时也大概率不动. 强制最小速度 + rotate_to_heading 参数:
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.30
      rotate_to_heading_angular_vel: 0.8   # 中等档, 跨过 ESP32 motor 死区
      min_approach_linear_velocity: 0.15   # 接近时最小线速度

local_costmap:
  local_costmap:
    ros__parameters:
      robot_radius: 0.18
      resolution: 0.05
      update_frequency: 5.0
      publish_frequency: 2.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_lidar  # 同 amcl, 避开 ESP32 空 /scan
          sensor_frame: laser_link
          data_type: "LaserScan"
          marking: true
          clearing: true
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.20  # ≥ 0.186 inscribed (机器人半径), 否则 controller 报警

global_costmap:
  global_costmap:
    ros__parameters:
      robot_radius: 0.18
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_lidar
          sensor_frame: laser_link
          data_type: "LaserScan"
          marking: true
          clearing: true
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.20

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      use_astar: true  # A* 比 Dijkstra 更适合稀疏场地
      allow_unknown: false

# 复制 nav2_bringup 默认 collision_monitor 配置, 仅改 scan topic = /scan_lidar.
# (空 polygons 会 SIGABRT — 必须给至少一个 polygon)
collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.0    # 实测 hardware odom 11Hz, default 0.2 太严
    source_timeout: 5.0         # 默认 1.0 太严, 调宽避免误 stop
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: False    # 禁用 collision_monitor approach action — controller 自己有 inflation_layer 已经够避障
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan_lidar"  # 跟 amcl/costmap 一致, 避开 ESP32 空 /scan
      min_height: 0.05
      max_height: 0.30
      enabled: True

# 我们没充电桩, 但 nav2_bringup navigation_launch 默认拉起 docking_server. 给最小配置
# 让它不 SIGABRT (dock_plugins 不能为空, 否则 ParameterUninitializedException).
docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true

; DASE7503 — Yahboom MicroROS-Board ESP32-S3 固件 (PlatformIO 版)
;
; 切换原因: micro_ros_arduino v2.0.8-jazzy 的 precompiled libmicroros.a 只打包了
; 原版 ESP32 (LX6 ISA), 不支持 ESP32-S3 (LX7). PlatformIO 的 micro_ros_platformio
; 有 jazzy 官方 S3 支持, 一行 board_microros_distro=jazzy 搞定.

[env:yahboom_s3]
platform = espressif32 @ ^6.8.0
board = esp32-s3-devkitc-1
framework = arduino

; Serial 走 UART0 → CP2102 桥 → Pi5 USB, 不走 ESP32-S3 原生 USB CDC.
; Yahboom 板的串口就是这样接的. board json 的 extra_flags 硬编 ARDUINO_USB_MODE=1
; 会覆盖 build_flags 后加的 =0, 所以必须先 build_unflags 剔除.
build_unflags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    madhephaestus/ESP32Servo @ ^3.0.0

; micro_ros_platformio 专用: 自动下载 jazzy 对应的 precompiled libmicroros
board_microros_distro = jazzy
board_microros_transport = serial

; 上传 + 监视
upload_port = /dev/ttyUSB0
upload_speed = 921600
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

; esptool flash_id 实测: Yahboom MicroROS-Board ESP32-S3 = 4MB Flash + 2MB PSRAM
; 固件本身只 ~400KB, 4MB 的 default partition (app 1.5MB x2 + data) 够用有余.
board_build.flash_size = 4MB
board_build.partitions = default.csv
board_upload.flash_size = 4MB
